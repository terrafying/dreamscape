# Docker Compose configuration for qr-sampler
# Engine: vLLM (NVIDIA GPU)
# Model: Qwen/Qwen2.5-1.5B-Instruct
# Entropy source: Quantum gRPC
# Amplifier: Z-Score Mean
# Sampler: Fixed Temperature
#
# Generated by: qr-sampler build

services:
  entropy-server:
    build:
      context: ./qr-sampler
      dockerfile: examples/docker/Dockerfile.entropy-server
    ports:
      - "${ENTROPY_SERVER_PORT:-50051}:50051"
    environment:
      - ENTROPY_SERVER=${ENTROPY_SERVER:-simple_urandom_server.py}
    restart: unless-stopped

  inference:
    build:
      context: ./qr-sampler
      dockerfile: examples/docker/Dockerfile.vllm
    ports:
      - "${INFERENCE_PORT:-8000}:8000"
    environment:
      - HF_MODEL=google/gemma-4-26b-moe
      - MODEL=google/gemma-4-26b-moe
      - DTYPE=half
      - MAX_MODEL_LEN=8192
      - GPU_MEMORY_UTILIZATION=0.8
      - HF_TOKEN=${HF_TOKEN:-}
      - QR_ENTROPY_SOURCE_TYPE=quantum_grpc
      - QR_GRPC_SERVER_ADDRESS=entropy-server:50051
      - QR_SAMPLE_COUNT=20480
      - QR_GRPC_MODE=unary
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - entropy-server
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OPENAI_API_BASE_URL=http://inference:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
    depends_on:
      - inference
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  huggingface-cache:
  open-webui-data:
